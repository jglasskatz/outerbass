<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Outer Bass</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Unbounded:wght@300;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --abyss: #030712;
    --deep: #0a1628;
    --ink: #0f2040;
    --glow: #00e5ff;
    --glow-dim: #007a8a;
    --bio: #39ff8f;
    --warning: #ff3d5a;
    --sand: #c2b99e;
  }

  html, body {
    background: var(--abyss);
    color: #d0e8f0;
    font-family: 'Space Mono', monospace;
    overflow-x: hidden;
    scroll-behavior: smooth;
  }

  /* === HERO === */
  .hero {
    position: relative;
    width: 100%;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .hero-img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0.85;
    filter: brightness(0.7) saturate(1.3);
  }

  .hero-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      180deg,
      rgba(3,7,18,0) 0%,
      rgba(3,7,18,0.15) 50%,
      rgba(3,7,18,0.9) 100%
    );
  }

  .hero-content {
    position: relative;
    z-index: 2;
    text-align: center;
    animation: fadeUp 1.2s ease-out both;
  }

  .hero-content h1 {
    font-family: 'Unbounded', sans-serif;
    font-weight: 900;
    font-size: clamp(3rem, 10vw, 8rem);
    letter-spacing: -0.02em;
    color: #fff;
    text-shadow: 0 0 60px rgba(0,229,255,0.3);
    line-height: 1;
  }

  .hero-content p {
    margin-top: 1rem;
    font-size: 1rem;
    color: var(--glow-dim);
    letter-spacing: 0.3em;
    text-transform: uppercase;
  }

  .scroll-cue {
    position: absolute;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    z-index: 2;
    animation: bob 2s ease-in-out infinite;
    color: var(--glow);
    font-size: 0.8rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    text-align: center;
    text-decoration: none;
    cursor: pointer;
    transition: opacity 0.3s;
    text-shadow: 0 0 12px rgba(0,229,255,0.5);
  }
  .scroll-cue:hover { opacity: 0.7; }
  .scroll-cue::after {
    content: '▾';
    display: block;
    font-size: 1.6rem;
    margin-top: 0.3rem;
  }

  @keyframes bob {
    0%, 100% { transform: translateX(-50%) translateY(0); }
    50% { transform: translateX(-50%) translateY(8px); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* === GAME SECTION === */
  .game-section {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 4rem 1rem 6rem;
    background: linear-gradient(180deg, var(--abyss) 0%, var(--deep) 100%);
  }

  .game-section h2 {
    font-family: 'Unbounded', sans-serif;
    font-weight: 700;
    font-size: clamp(1.5rem, 4vw, 2.5rem);
    margin-bottom: 0.5rem;
    color: var(--glow);
    text-shadow: 0 0 30px rgba(0,229,255,0.25);
  }

  .game-section .subtitle {
    color: var(--glow-dim);
    font-size: 0.8rem;
    letter-spacing: 0.15em;
    margin-bottom: 2rem;
  }

  #gameCanvas {
    border: 1px solid var(--ink);
    border-radius: 8px;
    background: var(--abyss);
    box-shadow: 0 0 60px rgba(0,229,255,0.06), inset 0 0 80px rgba(0,0,0,0.5);
    display: block;
    max-width: 100%;
    cursor: pointer;
  }

  .controls-hint {
    margin-top: 1rem;
    font-size: 0.75rem;
    color: #4a6a7a;
    letter-spacing: 0.1em;
  }

  /* === FOOTER === */
  footer {
    text-align: center;
    padding: 2rem;
    color: #1e3a4a;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    background: var(--deep);
  }
</style>
</head>
<body>

<!-- HERO -->
<section class="hero">
  <img src="ob.jpg" alt="Outer Bass" class="hero-img">
  <div class="hero-overlay"></div>
  <div class="hero-content">
    <h1>OUTER BASS</h1>
    <p>into the deep</p>
  </div>
  <a href="#game" class="scroll-cue">dive in</a>
</section>

<!-- GAME -->
<section id="game" class="game-section">
  <h2>DEPTH CHARGE</h2>
  <p class="subtitle">avoid the abyss dwellers — survive the descent</p>
  <canvas id="gameCanvas" width="800" height="400"></canvas>
  <p class="controls-hint">SPACE / TAP to dive &amp; surface &bull; avoid squid &amp; rocks</p>
</section>

<footer>&copy; OUTER BASS</footer>

<script>
(() => {
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width;
  const H = canvas.height;

  // --- state ---
  let gameState = 'idle'; // idle | running | dead
  let score = 0;
  let highScore = 0;
  let frameCount = 0;
  let speed = 3;
  let particles = [];
  let obstacles = [];
  let bubbles = [];
  let depthLines = [];

  // submarine
  const sub = { x: 120, y: H / 2, w: 54, h: 24, vy: 0, targetVy: 0 };

  // input
  let pressing = false;

  function onDown(e) {
    e.preventDefault();
    pressing = true;
    if (gameState === 'idle' || gameState === 'dead') {
      startGame();
    }
  }
  function onUp(e) { pressing = false; }

  canvas.addEventListener('pointerdown', onDown);
  canvas.addEventListener('pointerup', onUp);
  document.addEventListener('keydown', e => {
    if (e.code === 'Space') onDown(e);
  });
  document.addEventListener('keyup', e => {
    if (e.code === 'Space') onUp(e);
  });

  function startGame() {
    gameState = 'running';
    score = 0;
    frameCount = 0;
    speed = 3;
    sub.y = H / 2;
    sub.vy = 0;
    obstacles = [];
    bubbles = [];
    particles = [];
    depthLines = [];
    for (let i = 0; i < 30; i++) {
      particles.push(makeParticle(Math.random() * W));
    }
    for (let i = 0; i < 6; i++) {
      depthLines.push({ x: Math.random() * W, y: Math.random() * H, len: 30 + Math.random() * 60, alpha: 0.03 + Math.random() * 0.04 });
    }
  }

  function makeParticle(x) {
    return { x, y: Math.random() * H, r: 0.5 + Math.random() * 1.5, speed: 0.5 + Math.random() * 1.5, alpha: 0.15 + Math.random() * 0.35 };
  }

  // --- obstacles ---
  function spawnObstacle() {
    const type = Math.random() < 0.5 ? 'squid' : 'rock';
    const size = type === 'squid' ? 28 + Math.random() * 18 : 20 + Math.random() * 30;
    obstacles.push({
      type,
      x: W + 40,
      y: 30 + Math.random() * (H - 60),
      size,
      wobble: Math.random() * Math.PI * 2,
      speed: speed + Math.random() * 1.2
    });
  }

  // --- drawing helpers ---
  function drawSub(x, y) {
    ctx.save();
    // hull
    ctx.fillStyle = '#1a3a5c';
    ctx.strokeStyle = '#3af';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.ellipse(x, y, sub.w / 2, sub.h / 2, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    // viewport
    ctx.fillStyle = 'rgba(0,229,255,0.5)';
    ctx.beginPath();
    ctx.arc(x + 14, y - 2, 6, 0, Math.PI * 2);
    ctx.fill();

    // conning tower
    ctx.fillStyle = '#1a3a5c';
    ctx.strokeStyle = '#3af';
    ctx.beginPath();
    ctx.roundRect(x - 6, y - sub.h / 2 - 8, 16, 10, 3);
    ctx.fill();
    ctx.stroke();

    // propeller
    const pAng = frameCount * 0.4;
    ctx.strokeStyle = '#5cf';
    ctx.lineWidth = 2;
    for (let i = 0; i < 3; i++) {
      const a = pAng + (i * Math.PI * 2) / 3;
      ctx.beginPath();
      ctx.moveTo(x - sub.w / 2, y);
      ctx.lineTo(x - sub.w / 2 - Math.cos(a) * 8, y + Math.sin(a) * 8);
      ctx.stroke();
    }

    // glow
    const grd = ctx.createRadialGradient(x + 14, y, 0, x + 14, y, 30);
    grd.addColorStop(0, 'rgba(0,229,255,0.12)');
    grd.addColorStop(1, 'rgba(0,229,255,0)');
    ctx.fillStyle = grd;
    ctx.fillRect(x - 20, y - 35, 70, 70);
    ctx.restore();
  }

  function drawSquid(o) {
    const s = o.size;
    const wobY = Math.sin(o.wobble) * 4;
    ctx.save();
    ctx.translate(o.x, o.y + wobY);

    // tentacles
    ctx.strokeStyle = 'rgba(200,50,90,0.6)';
    ctx.lineWidth = 2;
    for (let i = 0; i < 5; i++) {
      const angle = -0.4 + i * 0.2;
      ctx.beginPath();
      ctx.moveTo(-s * 0.3, 0);
      const tentLen = s * (0.6 + Math.sin(frameCount * 0.08 + i) * 0.2);
      ctx.quadraticCurveTo(
        -s * 0.5, Math.sin(frameCount * 0.1 + i * 1.2) * 12,
        -s * 0.3 - tentLen * Math.cos(angle), tentLen * Math.sin(angle)
      );
      ctx.stroke();
    }

    // mantle
    ctx.fillStyle = '#8b1a3a';
    ctx.beginPath();
    ctx.ellipse(0, 0, s * 0.5, s * 0.3, 0, 0, Math.PI * 2);
    ctx.fill();

    // eye
    ctx.fillStyle = '#ff3d5a';
    ctx.beginPath();
    ctx.arc(s * 0.15, -s * 0.05, s * 0.1, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(s * 0.17, -s * 0.07, s * 0.04, 0, Math.PI * 2);
    ctx.fill();

    // bioluminescent glow
    const grd = ctx.createRadialGradient(0, 0, 0, 0, 0, s * 0.8);
    grd.addColorStop(0, 'rgba(255,61,90,0.08)');
    grd.addColorStop(1, 'rgba(255,61,90,0)');
    ctx.fillStyle = grd;
    ctx.fillRect(-s, -s, s * 2, s * 2);

    ctx.restore();
  }

  function drawRock(o) {
    const s = o.size;
    ctx.save();
    ctx.translate(o.x, o.y);
    ctx.fillStyle = '#1a2a3a';
    ctx.strokeStyle = '#2a4a5a';
    ctx.lineWidth = 1;
    ctx.beginPath();
    // jagged polygon
    const pts = 7;
    for (let i = 0; i < pts; i++) {
      const a = (i / pts) * Math.PI * 2;
      const r = s * (0.4 + ((Math.sin(i * 3.7 + o.x) + 1) / 2) * 0.5);
      const px = Math.cos(a) * r;
      const py = Math.sin(a) * r;
      i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
    }
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    ctx.restore();
  }

  // --- collision ---
  function collides(o) {
    const wobY = o.type === 'squid' ? Math.sin(o.wobble) * 4 : 0;
    const dx = sub.x - o.x;
    const dy = sub.y - (o.y + wobY);
    const minDist = (sub.w * 0.35) + (o.size * 0.35);
    return (dx * dx + dy * dy) < (minDist * minDist);
  }

  // --- game loop ---
  function update() {
    frameCount++;

    if (gameState === 'running') {
      // sub physics
      sub.targetVy = pressing ? 3.5 : -2.5;
      sub.vy += (sub.targetVy - sub.vy) * 0.1;
      sub.y += sub.vy;
      sub.y = Math.max(sub.h, Math.min(H - sub.h, sub.y));

      // speed ramp
      speed = 3 + Math.floor(score / 500) * 0.5;

      // spawn
      const spawnRate = Math.max(40, 80 - Math.floor(score / 200) * 3);
      if (frameCount % spawnRate === 0) spawnObstacle();

      // obstacles
      for (let i = obstacles.length - 1; i >= 0; i--) {
        const o = obstacles[i];
        o.x -= o.speed;
        if (o.type === 'squid') o.wobble += 0.06;
        if (o.x < -60) { obstacles.splice(i, 1); continue; }
        if (collides(o)) { die(); break; }
      }

      // bubbles from sub
      if (frameCount % 6 === 0) {
        bubbles.push({
          x: sub.x - sub.w / 2 - 4,
          y: sub.y + (Math.random() - 0.5) * 10,
          r: 1 + Math.random() * 2.5,
          alpha: 0.4,
          vx: -(1 + Math.random()),
          vy: -(0.3 + Math.random() * 0.6)
        });
      }

      score += 1;
    }

    // bubbles
    for (let i = bubbles.length - 1; i >= 0; i--) {
      const b = bubbles[i];
      b.x += b.vx;
      b.y += b.vy;
      b.alpha -= 0.006;
      if (b.alpha <= 0) bubbles.splice(i, 1);
    }

    // bg particles (always)
    for (const p of particles) {
      p.x -= p.speed;
      if (p.x < -5) { p.x = W + 5; p.y = Math.random() * H; }
    }

    // depth lines
    for (const d of depthLines) {
      d.x -= 0.5;
      if (d.x < -d.len) { d.x = W + 10; d.y = Math.random() * H; }
    }
  }

  function die() {
    gameState = 'dead';
    if (score > highScore) highScore = score;
    // explosion particles
    for (let i = 0; i < 20; i++) {
      bubbles.push({
        x: sub.x, y: sub.y,
        r: 1 + Math.random() * 3,
        alpha: 0.7,
        vx: (Math.random() - 0.5) * 5,
        vy: (Math.random() - 0.5) * 5
      });
    }
  }

  function draw() {
    // BG gradient
    const bg = ctx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, '#040e1e');
    bg.addColorStop(1, '#020509');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, W, H);

    // depth lines
    for (const d of depthLines) {
      ctx.strokeStyle = `rgba(0,229,255,${d.alpha})`;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(d.x, d.y);
      ctx.lineTo(d.x + d.len, d.y);
      ctx.stroke();
    }

    // bg particles
    for (const p of particles) {
      ctx.fillStyle = `rgba(0,229,255,${p.alpha})`;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
    }

    // obstacles
    for (const o of obstacles) {
      o.type === 'squid' ? drawSquid(o) : drawRock(o);
    }

    // bubbles
    for (const b of bubbles) {
      ctx.strokeStyle = `rgba(0,229,255,${b.alpha})`;
      ctx.lineWidth = 0.8;
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
      ctx.stroke();
    }

    // sub
    if (gameState !== 'dead') drawSub(sub.x, sub.y);

    // HUD
    ctx.fillStyle = 'rgba(0,229,255,0.7)';
    ctx.font = '700 14px "Space Mono", monospace';
    ctx.textAlign = 'left';
    ctx.fillText(`DEPTH  ${score}m`, 16, 28);
    if (highScore > 0) {
      ctx.fillStyle = 'rgba(0,229,255,0.35)';
      ctx.fillText(`BEST  ${highScore}m`, 16, 48);
    }

    // overlays
    if (gameState === 'idle') {
      drawCenterText('PRESS SPACE TO DIVE', 'rgba(0,229,255,0.6)');
    } else if (gameState === 'dead') {
      drawCenterText(`CRUSHED AT ${score}m — SPACE TO RETRY`, 'rgba(255,61,90,0.8)');
    }
  }

  function drawCenterText(text, color) {
    ctx.fillStyle = color;
    ctx.font = '700 16px "Space Mono", monospace';
    ctx.textAlign = 'center';
    ctx.fillText(text, W / 2, H / 2);
  }

  function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
  }

  // init particles for idle state
  for (let i = 0; i < 30; i++) particles.push(makeParticle(Math.random() * W));
  for (let i = 0; i < 6; i++) depthLines.push({ x: Math.random() * W, y: Math.random() * H, len: 30 + Math.random() * 60, alpha: 0.03 + Math.random() * 0.04 });

  loop();
})();
</script>
</body>
</html>
